        /* ═══ PREMIUM UI OVERRIDES ════════════════════ */
        :root {
            --bdr-hover: rgba(255, 255, 255, 0.15);
            --card-glow: 0 16px 48px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .auth-card,
        .feat-card,
        .dash-card,
        .glass-panel,
        .info-card,
        .step-card,
        .mc,
        .sp-card,
        .career-card,
        .faq-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01)) !important;
            backdrop-filter: blur(24px) !important;
            -webkit-backdrop-filter: blur(24px) !important;
            transform: translateZ(0);
            /* 3D Glass Borders & Bevels */
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.6) !important;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease !important;
            /* 3D Thickness & Shadows */
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.15),
                inset 0 -4px 10px rgba(0, 0, 0, 0.6),
                inset 0 -1px 0 rgba(0, 0, 0, 0.8),
                0 12px 30px rgba(0, 0, 0, 0.5),
                0 4px 8px rgba(0, 0, 0, 0.4) !important;
            position: relative;
            overflow: hidden;
        }

        /* The Premium Spotlight Effect */
        .auth-card::before,
        .feat-card::before,
        .dash-card::before,
        .glass-panel::before,
        .info-card::before,
        .step-card::before,
        .analyzer-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(400px circle at var(--mouse-x, 0) var(--mouse-y, 0),
                    rgba(0, 240, 255, 0.15),
                    transparent 40%);
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .auth-card:hover::before,
        .feat-card:hover::before,
        .dash-card:hover::before,
        .glass-panel:hover::before,
        .info-card:hover::before,
        .step-card:hover::before,
        .mc:hover::before,
        .sp-card:hover::before,
        .career-card:hover::before,
        .analyzer-card:hover::after {
            opacity: 1;
        }

        /* Ensure content stays above the spotlight */
        .auth-card>*,
        .feat-card>*,
        .dash-card>*,
        .glass-panel>*,
        .info-card>*,
        .analyzer-card>* {
            position: relative;
            z-index: 1;
        }

        .auth-card:hover,
        .feat-card:hover,
        .dash-card:hover,
        .info-card:hover {
            transform: translateY(-8px) scale(1.01) !important;
            border-color: rgba(0, 240, 255, 0.3) !important;
            border-top-color: rgba(0, 240, 255, 0.6) !important;
            /* Enhance 3D shadow on hover */
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                inset 0 -6px 15px rgba(0, 0, 0, 0.8),
                inset 0 -1px 0 rgba(0, 0, 0, 0.9),
                0 24px 50px rgba(0, 0, 0, 0.7),
                0 10px 20px rgba(0, 240, 255, 0.15) !important;
        }

        .btn-amb {
            box-shadow: 0 4px 14px rgba(232, 140, 42, 0.3);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s ease;
        }

        .btn-amb:hover {
            box-shadow: 0 8px 24px rgba(232, 140, 42, 0.5) !important;
        }

        .btn-out {
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s ease, border-color 0.3s ease;
        }

        .btn-out:hover {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        /* 3D Tilt Wrapper */
        .tilt-wrapper {
            perspective: 1000px;
        }

        /* Reveal utility */
        .reveal {
            opacity: 0;
            visibility: hidden;
        }

        #splash-screen {

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--wh, #ffffff);
            letter-spacing: -0.02em;

            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .splash-logo-mark {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--amb, #ffb900), var(--amb2, #ff8800));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg, #0b1322);
            font-size: 1.6rem;
            box-shadow: 0 0 30px rgba(232, 140, 42, 0.4);
            animation: pulseMark 1.5s infinite alternate;
        }

        .splash-text em {
            color: var(--amb, #ffb900);
            font-style: normal;
        }

        .splash-loader {
            width: 240px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .splash-loader-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--cyan, #37d7ff);
            width: 0%;
            box-shadow: 0 0 15px var(--cyan, #37d7ff);
            animation: loadBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes pulseMark {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 20px rgba(232, 140, 42, 0.2);
            }

            100% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(232, 140, 42, 0.6);
            }
        }

        @keyframes loadBar {
            0% {
                width: 0%;
            }

            40% {
                width: 40%;
            }

            70% {
                width: 80%;
            }

            100% {
                width: 100%;
            }
        }
